<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="g" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#1a1a3a"/>
      <stop offset="60%" stop-color="#0c0c14"/>
      <stop offset="100%" stop-color="#08080E"/>
    </radialGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#g)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Mark -->
  <g transform="translate(100 110)" fill="#ffffff">
    <circle cx="20" cy="22" r="11"/>
    <circle cx="64" cy="22" r="11"/>
    <circle cx="42" cy="60" r="11"/>
  </g>
  <text x="190" y="160" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="500" letter-spacing="-1.5" fill="#ffffff">Dyson</text>

  <!-- Headline -->
  <text x="100" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="92" font-weight="500" letter-spacing="-3.5" fill="#ffffff">The system of record</text>
  <text x="100" y="420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="92" font-weight="500" letter-spacing="-3.5" fill="rgba(255,255,255,0.45)">for </text>
  <text x="232" y="420" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="92" font-weight="400" letter-spacing="-1" fill="#ffffff">why</text>
  <text x="376" y="420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="92" font-weight="500" letter-spacing="-3.5" fill="rgba(255,255,255,0.45)">.</text>

  <!-- Subhead -->
  <text x="100" y="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="400" letter-spacing="-0.4" fill="rgba(255,255,255,0.55)">Context infrastructure for engineering teams.</text>

  <!-- URL -->
  <text x="100" y="570" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="20" font-weight="500" letter-spacing="0.5" fill="rgba(255,255,255,0.35)">dyson.ai</text>
</svg>
