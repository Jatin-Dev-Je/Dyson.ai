# Google Cloud Build — CI/CD pipeline.
# Triggers: push to main (deploy), push to any PR branch (test only).
#
# Required substitutions (Cloud Build trigger config):
#   _PROJECT_ID     — GCP project ID
#   _REGION         — Cloud Run region (e.g. us-central1)
#   _SERVICE_NAME   — Cloud Run service name (e.g. dyson-api)
#   _IMAGE          — gcr.io/$PROJECT_ID/dyson-api

steps:

  # ── 1. Install dependencies ───────────────────────────────────────────────
  - name: node:22-alpine
    id: install
    dir: backend
    entrypoint: npm
    args: [ci, --no-audit, --no-fund]

  # ── 2. Typecheck ──────────────────────────────────────────────────────────
  - name: node:22-alpine
    id: typecheck
    dir: backend
    entrypoint: npm
    args: [run, typecheck]
    waitFor: [install]

  # ── 3. Lint ───────────────────────────────────────────────────────────────
  - name: node:22-alpine
    id: lint
    dir: backend
    entrypoint: npm
    args: [run, lint]
    waitFor: [install]

  # ── 4. Tests ──────────────────────────────────────────────────────────────
  - name: node:22-alpine
    id: test
    dir: backend
    entrypoint: npm
    args: [test]
    waitFor: [install]

  # ── 5. Build Docker image ─────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag=$_IMAGE:$SHORT_SHA
      - --tag=$_IMAGE:latest
      - --cache-from=$_IMAGE:latest
      - ./backend
    waitFor: [typecheck, lint, test]

  # ── 6. Push to Container Registry ─────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    args: [push, --all-tags, $_IMAGE]
    waitFor: [build]

  # ── 7. Deploy to Cloud Run ────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/gcloud
    id: deploy
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image=$_IMAGE:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --quiet
    waitFor: [push]

images:
  - $_IMAGE:$SHORT_SHA
  - $_IMAGE:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s   # 20 min max — Docker layer caching keeps this under 5 min in practice
